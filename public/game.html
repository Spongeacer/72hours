<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>72Hours - 金田起义前夜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background: #1a1a1a;
            color: #d4c4a8;
            min-height: 100vh;
            line-height: 1.8;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #3a3a3a;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            font-weight: 400;
            letter-spacing: 0.2em;
            margin-bottom: 10px;
            color: #c9b896;
        }
        
        .subtitle {
            font-size: 1em;
            color: #8a7a5a;
        }
        
        .setup-panel {
            background: #252525;
            padding: 30px;
            border: 1px solid #3a3a3a;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #c9b896;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            color: #d4c4a8;
            font-family: inherit;
            font-size: 1em;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #8a7a5a;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #8a7a5a;
            border: none;
            color: #1a1a1a;
            font-family: inherit;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #c9b896;
        }
        
        .btn:disabled {
            background: #3a3a3a;
            color: #6a6a6a;
            cursor: not-allowed;
        }
        
        .game-panel {
            display: none;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #252525;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid #3a3a3a;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .status-item {
            font-size: 0.9em;
        }
        
        .status-label {
            color: #8a7a5a;
        }
        
        .status-value {
            color: #c9b896;
        }
        
        .narrative {
            background: #252525;
            padding: 30px;
            border: 1px solid #3a3a3a;
            margin-bottom: 20px;
            white-space: pre-line;
            line-height: 2;
            min-height: 100px;
        }
        
        .choices {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .choice-btn {
            padding: 20px;
            background: transparent;
            border: 1px solid #3a3a3a;
            color: #d4c4a8;
            text-align: left;
            font-family: inherit;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .choice-btn:hover:not(:disabled) {
            border-color: #8a7a5a;
            background: #2a2a2a;
        }
        
        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8a7a5a;
        }
        
        .error {
            background: #3a2525;
            border: 1px solid #5a3a3a;
            color: #c9a0a0;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .result-panel {
            background: #252525;
            padding: 20px;
            border: 1px solid #3a3a3a;
            margin-bottom: 20px;
            display: none;
        }
        
        .hidden-choice {
            border-color: #8a7a5a !important;
            background: #2a2520 !important;
        }
        
        .hidden-badge {
            display: inline-block;
            background: #8a7a5a;
            color: #1a1a1a;
            padding: 2px 8px;
            font-size: 0.8em;
            margin-right: 10px;
        }
        
        .debug-info {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 10px;
            margin-top: 20px;
            font-size: 0.8em;
            color: #6a5a4a;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>72Hours</h1>
            <p class="subtitle">金田起义前夜 · 一个读书人的72小时</p>
        </header>
        
        <div class="setup-panel" id="setupPanel">
            <h3 style="color: #c9b896; margin-bottom: 20px; font-weight: 400;">开始游戏</h3>
            
            <div class="form-group" id="apiKeyGroup" style="display: none;">
                <label>SiliconFlow API Key（仅当服务器未配置时需要）</label>
                <input type="password" id="apiKey" placeholder="sk-...">
                <small style="color: #6a5a4a; display: block; margin-top: 5px;">如果服务器已配置 API Key，则无需填写</small>
            </div>
            
            <div class="form-group">
                <label>选择身份</label>
                <select id="identity">
                    <option value="scholar">村中的读书人（推荐）</option>
                    <option value="landlord">金田村的地主</option>
                    <option value="soldier">官府的士兵</option>
                    <option value="cultist">教会的受众</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>选择模型</label>
                <select id="model">
                    <option value="Pro/MiniMaxAI/MiniMax-M2.5">MiniMax-M2.5（推荐，速度快）</option>
                    <option value="deepseek-ai/DeepSeek-V3.2">DeepSeek-V3.2（质量好，较慢）</option>
                </select>
            </div>
            
            <button class="btn" id="startBtn" onclick="startGame()">开始游戏</button>
        </div>
        
        <div class="game-panel" id="gamePanel">
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-label">回合: </span>
                    <span class="status-value" id="turnDisplay">1/72</span>
                </div>
                <div class="status-item">
                    <span class="status-label">时间: </span>
                    <span class="status-value" id="timeDisplay">1851年1月8日 01:00</span>
                </div>
                <div class="status-item">
                    <span class="status-label">压强: </span>
                    <span class="status-value" id="pressureDisplay">10/100</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Ω: </span>
                    <span class="status-value" id="omegaDisplay">1.00</span>
                </div>
                <div class="status-item" style="margin-left: auto;">
                    <button class="btn" onclick="showSaveMenu()" style="padding: 6px 12px; font-size: 0.85em;">存档</button>
                    <button class="btn" onclick="showLoadMenu()" style="padding: 6px 12px; font-size: 0.85em; margin-left: 8px;">读档</button>
                </div>
            </div>
            
            <div class="narrative" id="narrative">
                等待游戏开始...
            </div>
            
            <div class="result-panel" id="resultPanel">
                <strong style="color: #c9b896;">选择结果:</strong>
                <p id="resultText"></p>
            </div>
            
            <div class="choices" id="choices">
                <!-- 选择按钮将在这里生成 -->
            </div>
            
            <div class="loading" id="loading" style="display: none;">
                正在生成叙事...
            </div>
            
            <div class="debug-info" id="debugInfo" style="display: none;">
                <div>游戏ID: <span id="debugGameId">-</span></div>
                <div>当前回合: <span id="debugTurn">-</span></div>
                <div>状态: <span id="debugStatus">-</span></div>
            </div>
        </div>
    </div>

    <!-- 存档菜单 -->
    <div id="saveMenu" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #252525; border: 1px solid #3a3a3a; padding: 30px; max-width: 500px; max-height: 80vh; overflow-y: auto; z-index: 1000;">
        <h3 style="color: #c9b896; margin-bottom: 20px;">存档</h3>
        <div id="saveList" style="margin-bottom: 20px;">
            <!-- 存档列表 -->
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="saveName" placeholder="存档名称（可选）" style="flex: 1; padding: 8px; background: #1a1a1a; border: 1px solid #3a3a3a; color: #d4c4a8;">
            <button class="btn" onclick="createSave()" style="padding: 8px 16px;">新建存档</button>
        </div>
        <div style="margin-top: 15px; text-align: right;">
            <button class="btn" onclick="hideSaveMenu()" style="background: #3a3a3a;">关闭</button>
        </div>
    </div>

    <!-- 读档菜单 -->
    <div id="loadMenu" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #252525; border: 1px solid #3a3a3a; padding: 30px; max-width: 500px; max-height: 80vh; overflow-y: auto; z-index: 1000;">
        <h3 style="color: #c9b896; margin-bottom: 20px;">读档</h3>
        <div id="loadList" style="margin-bottom: 20px;">
            <!-- 存档列表 -->
        </div>
        <div style="margin-top: 15px; text-align: right;">
            <button class="btn" onclick="hideLoadMenu()" style="background: #3a3a3a;">关闭</button>
        </div>
    </div>

    <!-- 遮罩层 -->
    <div id="modalOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999;" onclick="hideAllMenus()"></div>

    <script>
        // 游戏状态管理
        const GameState = {
            gameId: null,
            currentContext: null,
            isProcessing: false,
            turn: 0,
            serverHasApiKey: false,
            saveSystem: null,
            
            reset() {
                this.gameId = null;
                this.currentContext = null;
                this.isProcessing = false;
                this.turn = 0;
                this.saveSystem = null;
            }
        };

        // 调试日志
        function debugLog(message, data = null) {
            console.log(`[72Hours] ${message}`, data || '');
            document.getElementById('debugStatus').textContent = message;
        }

        // 检查服务器配置
        async function checkServerConfig() {
            try {
                debugLog('正在检查服务器配置...');
                const response = await fetch('/api/config');
                const result = await response.json();
                
                if (result.success && result.data.hasApiKey) {
                    // 服务器已配置 API Key，隐藏输入框
                    document.getElementById('apiKeyGroup').style.display = 'none';
                    GameState.serverHasApiKey = true;
                    debugLog('服务器已配置 API Key');
                } else {
                    // 显示 API Key 输入框
                    document.getElementById('apiKeyGroup').style.display = 'block';
                    GameState.serverHasApiKey = false;
                    debugLog('需要客户端提供 API Key');
                }
            } catch (error) {
                console.error('检查服务器配置失败:', error);
                // 默认显示输入框
                document.getElementById('apiKeyGroup').style.display = 'block';
                GameState.serverHasApiKey = false;
            }
        }

        // 页面加载时检查服务器配置
        document.addEventListener('DOMContentLoaded', checkServerConfig);

        // 开始游戏
        async function startGame() {
            const apiKey = GameState.serverHasApiKey ? null : document.getElementById('apiKey').value.trim();
            const identity = document.getElementById('identity').value;
            const model = document.getElementById('model').value;

            if (!GameState.serverHasApiKey && !apiKey) {
                alert('请输入 SiliconFlow API Key');
                return;
            }

            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = '正在启动...';

            try {
                debugLog('正在创建游戏...');
                const response = await fetch('/api/games', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey, identity, model })
                });

                const result = await response.json();
                debugLog('游戏创建响应', result);

                // 统一错误处理
                if (!result.success) {
                    throw new Error(result.error?.message || '创建游戏失败');
                }

                const data = result.data;
                GameState.gameId = data.gameId;
                document.getElementById('debugGameId').textContent = data.gameId;
                
                // 显示游戏面板
                document.getElementById('setupPanel').style.display = 'none';
                document.getElementById('gamePanel').style.display = 'block';
                document.getElementById('debugInfo').style.display = 'block';
                
                // 显示开场
                showNarrative(data.opening || '游戏开始');
                
                // 开始第一回合
                await executeTurn();

            } catch (error) {
                debugLog('启动游戏失败', error.message);
                alert('启动游戏失败: ' + error.message);
                btn.disabled = false;
                btn.textContent = '开始游戏';
            }
        }

        // 执行回合（生成叙事和选择）
        async function executeTurn() {
            if (GameState.isProcessing) {
                debugLog('正在处理中，跳过');
                return;
            }
            
            GameState.isProcessing = true;
            debugLog('正在执行回合...');

            showLoading(true);
            clearChoices();

            try {
                const response = await fetch(`/api/games/${GameState.gameId}/turns`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });

                const data = await response.json();
                debugLog('回合响应', { turn: data.turn, hasChoices: !!data.choices });

                if (!data.success) {
                    throw new Error(data.error?.message || "请求失败");
                }

                // 更新状态
                GameState.turn = data.turn;
                GameState.currentContext = data.context;
                document.getElementById('debugTurn').textContent = data.turn;
                
                updateStatus(data.state);
                
                // 显示叙事
                if (data.narrative) {
                    showNarrative(data.narrative);
                }
                
                // 生成选择
                if (data.choices && data.choices.length > 0) {
                    generateChoices(data.choices);
                    debugLog(`生成了 ${data.choices.length} 个选择`);
                } else {
                    debugLog('警告：没有返回选择');
                    showError('没有可用的选择，请刷新页面重试');
                }

            } catch (error) {
                debugLog('执行回合失败', error.message);
                showError('执行回合失败: ' + error.message);
            } finally {
                GameState.isProcessing = false;
                showLoading(false);
            }
        }

        // 处理玩家选择
        async function handleChoice(choiceId) {
            if (GameState.isProcessing) {
                debugLog('正在处理中，跳过');
                return;
            }

            // 查找选择
            let choice = null;
            if (GameState.currentContext && GameState.currentContext.choices) {
                choice = GameState.currentContext.choices.find(c => c.id === choiceId);
            }
            
            if (!choice) {
                debugLog('警告：找不到选择', choiceId);
                choice = { id: choiceId, text: '未知选择' };
            }
            
            GameState.isProcessing = true;
            debugLog('正在处理选择', choiceId);

            // 禁用所有选择按钮
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.disabled = true;
            });

            showLoading(true);

            try {
                const response = await fetch(`/api/games/${GameState.gameId}/turns`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ choice })
                });

                const data = await response.json();
                debugLog('选择响应', { hasResult: !!data.result, gameOver: !!data.gameOver });

                if (!data.success) {
                    throw new Error(data.error?.message || "请求失败");
                }

                // 显示结果
                if (data.result) {
                    showResult(data.result.text || '选择已执行');
                }

                // 检查游戏结束
                if (data.gameOver) {
                    debugLog('游戏结束');
                    setTimeout(() => {
                        document.getElementById('narrative').textContent = '游戏结束';
                        clearChoices();
                        showResult('游戏已结束，点击重新开始');
                        addRestartButton();
                    }, 2000);
                    return;
                }

                // 延迟后进入下一回合
                debugLog('2秒后进入下一回合');
                setTimeout(() => {
                    hideResult();
                    executeTurn();
                }, 2000);

            } catch (error) {
                debugLog('处理选择失败', error.message);
                showError('处理选择失败: ' + error.message);
                GameState.isProcessing = false;
                showLoading(false);
            }
        }

        // 生成选择按钮
        function generateChoices(choices) {
            const container = document.getElementById('choices');
            container.innerHTML = '';

            choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                
                // 确保 choice 有 id
                const choiceId = choice.id || `choice_${index}`;
                const choiceText = choice.text || `选择 ${index + 1}`;
                const prefix = `${index + 1}. `;
                
                // 标记隐藏选择
                if (choice.type === 'hidden' || choice.isHidden) {
                    btn.classList.add('hidden-choice');
                    btn.innerHTML = `<span class="hidden-badge">隐藏</span>${prefix}${choiceText}`;
                } else {
                    btn.textContent = `${prefix}${choiceText}`;
                }
                
                btn.onclick = () => handleChoice(choiceId);
                container.appendChild(btn);
            });
        }

        // 更新状态显示
        function updateStatus(state) {
            if (!state) return;
            
            document.getElementById('turnDisplay').textContent = `${state.turn || 0}/72`;
            
            if (state.datetime) {
                document.getElementById('timeDisplay').textContent = formatGameTime(state.datetime);
            }
            
            document.getElementById('pressureDisplay').textContent = 
                `${Math.round(state.pressure || 0)}/100`;
            document.getElementById('omegaDisplay').textContent = 
                (state.omega || 0).toFixed(2);
        }

        // 格式化游戏时间
        function formatGameTime(datetime) {
            // 游戏时间格式: 1851年1月8日 01:00
            if (typeof datetime === 'string') {
                return datetime;
            }
            // 如果是 Date 对象，手动格式化
            try {
                const date = new Date(datetime);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();
                const hour = date.getHours().toString().padStart(2, '0');
                const minute = date.getMinutes().toString().padStart(2, '0');
                return `${year}年${month}月${day}日 ${hour}:${minute}`;
            } catch (e) {
                return String(datetime);
            }
        }

        // 显示/隐藏加载
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // 清除选择
        function clearChoices() {
            document.getElementById('choices').innerHTML = '';
        }

        // 显示结果
        function showResult(text) {
            document.getElementById('resultPanel').style.display = 'block';
            document.getElementById('resultText').textContent = text;
        }

        // 隐藏结果
        function hideResult() {
            document.getElementById('resultPanel').style.display = 'none';
        }

        // 显示叙事（带颜色重置）
        function showNarrative(text) {
            const narrative = document.getElementById('narrative');
            narrative.textContent = text;
            narrative.style.color = '#d4c4a8';  // 重置为正常颜色
        }

        // 显示错误
        function showError(message) {
            const narrative = document.getElementById('narrative');
            narrative.textContent = message;
            narrative.style.color = '#c9a0a0';
        }

        // 添加重新开始按钮
        function addRestartButton() {
            const container = document.getElementById('choices');
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = '重新开始';
            btn.onclick = () => location.reload();
            container.appendChild(btn);
        }

        // ========== 存档系统 ==========

        // 显示存档菜单
        function showSaveMenu() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('saveMenu').style.display = 'block';
            renderSaveList();
        }

        // 隐藏存档菜单
        function hideSaveMenu() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('saveMenu').style.display = 'none';
        }

        // 显示读档菜单
        function showLoadMenu() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('loadMenu').style.display = 'block';
            renderLoadList();
        }

        // 隐藏读档菜单
        function hideLoadMenu() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('loadMenu').style.display = 'none';
        }

        // 隐藏所有菜单
        function hideAllMenus() {
            hideSaveMenu();
            hideLoadMenu();
        }

        // 创建存档
        async function createSave() {
            const name = document.getElementById('saveName').value.trim();
            
            try {
                // 获取当前游戏状态
                const response = await fetch(`/api/games/${GameState.gameId}/state`);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error('获取游戏状态失败');
                }

                // 保存到本地存储
                const saveData = {
                    id: `save_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    name: name || `存档 ${new Date().toLocaleString('zh-CN')}`,
                    timestamp: Date.now(),
                    gameId: GameState.gameId,
                    gameState: result.data.state,
                    turn: result.data.state.turn,
                    datetime: result.data.state.datetime,
                    pressure: result.data.state.pressure,
                    omega: result.data.state.omega
                };

                // 保存到localStorage
                const savesKey = `72hours_saves_${GameState.gameId}`;
                const existingSaves = JSON.parse(localStorage.getItem(savesKey) || '[]');
                existingSaves.push(saveData);
                
                // 限制存档数量（最多10个）
                if (existingSaves.length > 10) {
                    existingSaves.shift();
                }
                
                localStorage.setItem(savesKey, JSON.stringify(existingSaves));
                
                // 清空输入框
                document.getElementById('saveName').value = '';
                
                // 刷新列表
                renderSaveList();
                
                alert('存档成功！');
            } catch (error) {
                console.error('存档失败:', error);
                alert('存档失败: ' + error.message);
            }
        }

        // 渲染存档列表
        function renderSaveList() {
            const container = document.getElementById('saveList');
            const savesKey = `72hours_saves_${GameState.gameId}`;
            const saves = JSON.parse(localStorage.getItem(savesKey) || '[]');
            
            if (saves.length === 0) {
                container.innerHTML = '<p style="color: #6a5a4a; text-align: center;">暂无存档</p>';
                return;
            }
            
            container.innerHTML = saves.map(save => `
                <div style="background: #1a1a1a; border: 1px solid #3a3a3a; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="color: #c9b896; font-weight: bold;">${escapeHtml(save.name)}</div>
                        <div style="color: #6a5a4a; font-size: 0.85em;">
                            回合 ${save.turn} | 压强 ${Math.round(save.pressure)}/100 | ${new Date(save.timestamp).toLocaleString('zh-CN')}
                        </div>
                    </div>
                    <button class="btn" onclick="deleteSave('${save.id}')" style="background: #5a3a3a; padding: 6px 12px; font-size: 0.85em;">删除</button>
                </div>
            `).reverse().join('');
        }

        // 渲染读档列表
        function renderLoadList() {
            const container = document.getElementById('loadList');
            const savesKey = `72hours_saves_${GameState.gameId}`;
            const saves = JSON.parse(localStorage.getItem(savesKey) || '[]');
            
            if (saves.length === 0) {
                container.innerHTML = '<p style="color: #6a5a4a; text-align: center;">暂无存档</p>';
                return;
            }
            
            container.innerHTML = saves.map(save => `
                <div style="background: #1a1a1a; border: 1px solid #3a3a3a; padding: 12px; margin-bottom: 10px; cursor: pointer;" onclick="loadSave('${save.id}')">
                    <div style="color: #c9b896; font-weight: bold;">${escapeHtml(save.name)}</div>
                    <div style="color: #6a5a4a; font-size: 0.85em;">
                        回合 ${save.turn} | 压强 ${Math.round(save.pressure)}/100 | ${new Date(save.timestamp).toLocaleString('zh-CN')}
                    </div>
                </div>
            `).reverse().join('');
        }

        // 删除存档
        function deleteSave(saveId) {
            if (!confirm('确定要删除这个存档吗？')) return;
            
            const savesKey = `72hours_saves_${GameState.gameId}`;
            const saves = JSON.parse(localStorage.getItem(savesKey) || '[]');
            const updatedSaves = saves.filter(s => s.id !== saveId);
            localStorage.setItem(savesKey, JSON.stringify(updatedSaves));
            
            renderSaveList();
        }

        // 读档
        async function loadSave(saveId) {
            try {
                const savesKey = `72hours_saves_${GameState.gameId}`;
                const saves = JSON.parse(localStorage.getItem(savesKey) || '[]');
                const save = saves.find(s => s.id === saveId);
                
                if (!save) {
                    throw new Error('存档不存在');
                }

                // 确认读档
                if (!confirm(`确定要读取存档「${save.name}」吗？当前进度将丢失。`)) return;

                // 这里可以实现从存档恢复游戏状态的逻辑
                // 目前简化处理：刷新页面并显示存档信息
                alert(`已读取存档：${save.name}\n回合：${save.turn}\n压强：${Math.round(save.pressure)}/100`);
                
                hideLoadMenu();
            } catch (error) {
                console.error('读档失败:', error);
                alert('读档失败: ' + error.message);
            }
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
