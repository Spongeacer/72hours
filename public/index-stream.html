<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>72Hours - 叙事引擎 (流式版)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'SimSun', serif;
            background: #1a1a1a;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
            padding: 10px;
            gap: 10px;
        }
        .left-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .character-status {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 8px 15px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
        }
        .status-item { display: flex; align-items: center; gap: 5px; }
        .status-label { color: #888; }
        .status-value { color: #fff; font-weight: bold; }
        .status-bar {
            width: 60px;
            height: 6px;
            background: #444;
            border-radius: 3px;
            overflow: hidden;
        }
        .status-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .fear-fill { background: #e74c3c; }
        .aggression-fill { background: #e67e22; }
        .hunger-fill { background: #f39c12; }
        .story-module {
            flex: 1;
            background: #252525;
            border: 1px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .story-header {
            background: #333;
            padding: 12px 15px;
            border-bottom: 1px solid #444;
        }
        .story-title { font-size: 16px; color: #fff; font-weight: bold; }
        .story-meta { font-size: 11px; color: #888; margin-top: 4px; }
        .story-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            line-height: 1.8;
        }
        .story-text { 
            margin-bottom: 15px; 
            white-space: pre-wrap;
        }
        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: #8b4513;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .choices-area {
            background: #2d2d2d;
            border-top: 1px solid #444;
            padding: 15px;
        }
        .choices-title {
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .choice-btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #3d3d3d;
            border: 1px solid #555;
            border-radius: 4px;
            color: #d4d4d4;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .choice-btn:hover:not(:disabled) {
            background: #4d4d4d;
            border-color: #777;
        }
        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .choice-btn.selected {
            background: #5d4a3d;
            border-color: #8b4513;
        }
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 250px;
        }
        .world-info {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 15px;
        }
        .world-title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .world-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .world-label { color: #888; }
        .world-value { color: #fff; font-weight: bold; }
        .model-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 12px;
        }
        .model-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
            transition: background 0.3s;
        }
        .model-status-dot.connected {
            background: #27ae60;
            box-shadow: 0 0 4px #27ae60;
        }
        .model-status-dot.disconnected {
            background: #e74c3c;
            box-shadow: 0 0 4px #e74c3c;
        }
        .model-status-text {
            color: #888;
        }
        .turn-indicator {
            background: #8b4513;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            text-align: center;
            margin-top: 10px;
        }
        .turn-number { font-size: 24px; font-weight: bold; }
        .turn-label { font-size: 11px; opacity: 0.8; }
        .npc-relations {
            flex: 1;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .npc-header {
            background: #333;
            padding: 12px 15px;
            border-bottom: 1px solid #444;
        }
        .npc-title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .npc-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .npc-item {
            background: #3d3d3d;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .npc-item:hover { background: #4d4d4d; }
        .npc-item.active {
            background: #5d4a3d;
            border-color: #8b4513;
        }
        .npc-name { font-weight: bold; color: #fff; margin-bottom: 3px; }
        .npc-brief { font-size: 11px; color: #888; }
        .npc-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #555; }
        .npc-item.active .npc-detail { display: block; }
        .npc-stat { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        .npc-stat-label { color: #888; }
        .npc-stat-value { color: #d4d4d4; }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-overlay.active { display: flex; }
        .loading-text {
            color: #fff;
            font-size: 18px;
            padding: 20px 40px;
            background: #333;
            border-radius: 8px;
            border: 1px solid #555;
        }
        .result-text {
            border-left: 3px solid #8b4513;
            padding-left: 15px;
            margin-top: 15px;
            color: #aaa;
        }
        .stream-status {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text">AI 正在生成叙事...</div>
    </div>
    
    <div class="container">
        <div class="left-panel">
            <div class="character-status">
                <div class="status-item">
                    <span class="status-label">恐惧:</span>
                    <div class="status-bar"><div class="status-fill fear-fill" style="width: 20%"></div></div>
                    <span class="status-value" id="fearValue">20</span>
                </div>
                <div class="status-item">
                    <span class="status-label">攻击性:</span>
                    <div class="status-bar"><div class="status-fill aggression-fill" style="width: 15%"></div></div>
                    <span class="status-value" id="aggressionValue">15</span>
                </div>
                <div class="status-item">
                    <span class="status-label">饥饿:</span>
                    <div class="status-bar"><div class="status-fill hunger-fill" style="width: 10%"></div></div>
                    <span class="status-value" id="hungerValue">10</span>
                </div>
            </div>
            
            <div class="story-module">
                <div class="story-header">
                    <div class="story-title" id="storyTitle">准备开始...</div>
                    <div class="story-meta" id="storyMeta">等待游戏初始化</div>
                </div>
                <div class="story-content" id="storyContent">
                    <div class="story-text">正在连接服务器...</div>
                </div>
                <div class="choices-area" id="choicesArea">
                    <div class="choices-title">你的选择：</div>
                    <div id="choicesList">请等待游戏加载...</div>
                    <div class="stream-status" id="streamStatus"></div>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="world-info">
                <div class="world-title">世界剧本</div>
                <div class="world-content">
                    <div class="world-item">
                        <span class="world-label">剧本</span>
                        <span class="world-value">金田起义</span>
                    </div>
                    <div class="world-item">
                        <span class="world-label">时间跨度</span>
                        <span class="world-value">72小时</span>
                    </div>
                    <div class="world-item">
                        <span class="world-label">当前时间</span>
                        <span class="world-value" id="currentTime">1851.1.8 01:00</span>
                    </div>
                    <div class="world-item">
                        <span class="world-label">环境压强</span>
                        <span class="world-value" id="pressureValue">11/100</span>
                    </div>
                    <div class="world-item">
                        <span class="world-label">历史大势</span>
                        <span class="world-value" id="omegaValue">Ω 1.02</span>
                    </div>
                </div>
                <div class="model-status">
                    <span class="model-status-dot connected" id="modelStatusDot"></span>
                    <span class="model-status-text" id="modelStatusText">DeepSeek-V3.2</span>
                </div>
                <div class="turn-indicator">
                    <div class="turn-number" id="turnNumber">1</div>
                    <div class="turn-label" id="turnLabel">第 1 / 72 回合</div>
                </div>
            </div>
            
            <div class="npc-relations">
                <div class="npc-header">
                    <div class="npc-title">人物关系</div>
                </div>
                <div class="npc-list" id="npcList">
                    <div class="npc-item">
                        <div class="npc-name">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api/game'
            : `${window.location.origin}/api/game`;
        
        let sessionId = null;
        let currentChoices = [];
        let isProcessing = false;
        let selectedChoiceId = null;
        let eventSource = null;
        
        const loadingOverlay = document.getElementById('loadingOverlay');
        const storyContent = document.getElementById('storyContent');
        const choicesList = document.getElementById('choicesList');
        const storyTitle = document.getElementById('storyTitle');
        const storyMeta = document.getElementById('storyMeta');
        const turnNumber = document.getElementById('turnNumber');
        const turnLabel = document.getElementById('turnLabel');
        const streamStatus = document.getElementById('streamStatus');
        
        // 打字机效果显示文本
        function typeWriter(element, text, speed = 30) {
            return new Promise(resolve => {
                let i = 0;
                element.innerHTML = '';
                
                const cursor = document.createElement('span');
                cursor.className = 'typing-cursor';
                element.appendChild(cursor);
                
                function type() {
                    if (i < text.length) {
                        cursor.before(text.charAt(i));
                        i++;
                        setTimeout(type, speed);
                    } else {
                        cursor.remove();
                        resolve();
                    }
                }
                
                type();
            });
        }
        
        // 追加文本（带打字机效果）
        async function appendTypeWriter(container, text, speed = 30) {
            const div = document.createElement('div');
            div.className = 'story-text';
            container.appendChild(div);
            await typeWriter(div, text, speed);
        }
        
        function showLoading() {
            loadingOverlay.classList.add('active');
        }
        
        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }
        
        // 创建游戏
        async function createGame(identity = 'scholar') {
            try {
                showLoading();
                const response = await fetch(`${API_BASE}/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identity })
                });
                
                const data = await response.json();
                hideLoading();
                
                if (data.success) {
                    sessionId = data.sessionId;
                    updateUI(data.data);
                    return true;
                } else {
                    storyContent.innerHTML = `<div class="story-text">创建游戏失败: ${data.error}</div>`;
                    return false;
                }
            } catch (error) {
                hideLoading();
                storyContent.innerHTML = `<div class="story-text">连接服务器失败，请刷新重试</div>`;
                console.error('创建游戏失败:', error);
                return false;
            }
        }
        
        // 流式执行回合
        async function executeTurnStream() {
            if (!sessionId || isProcessing) return;
            
            isProcessing = true;
            streamStatus.textContent = '正在生成叙事...';
            
            try {
                const response = await fetch(`${API_BASE}/turn/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let narrativeText = '';
                let turnData = null;
                
                // 清空故事内容区域
                storyContent.innerHTML = '';
                
                // 创建叙事显示区域
                const narrativeDiv = document.createElement('div');
                narrativeDiv.className = 'story-text';
                storyContent.appendChild(narrativeDiv);
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.type === 'start') {
                                    storyTitle.textContent = `第${data.turn}回合 · 暗流涌动`;
                                    storyMeta.textContent = 'AI 正在生成叙事...';
                                } else if (data.type === 'chunk') {
                                    // 更新叙事文本（打字机效果）
                                    narrativeText = data.fullText;
                                    narrativeDiv.textContent = narrativeText;
                                    storyContent.scrollTop = storyContent.scrollHeight;
                                } else if (data.type === 'narrative_complete') {
                                    streamStatus.textContent = '正在生成选择...';
                                } else if (data.type === 'complete') {
                                    turnData = data.data;
                                    updateTurnUI(turnData);
                                } else if (data.type === 'error') {
                                    console.error('流式错误:', data.error);
                                    streamStatus.textContent = '生成失败: ' + data.error;
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }
                
                isProcessing = false;
                streamStatus.textContent = '';
                
            } catch (error) {
                isProcessing = false;
                streamStatus.textContent = '';
                console.error('执行回合失败:', error);
            }
        }
        
        // 流式提交选择
        async function submitChoiceStream(choiceId) {
            if (!sessionId || isProcessing || selectedChoiceId !== null) return;
            
            selectedChoiceId = choiceId;
            isProcessing = true;
            streamStatus.textContent = '正在生成结果...';
            
            // 禁用所有按钮
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.disabled = true;
                if (parseInt(btn.dataset.choiceId) === choiceId) {
                    btn.classList.add('selected');
                }
            });
            
            try {
                const response = await fetch(`${API_BASE}/choice/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, choiceId })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let resultText = '';
                let followUpText = '';
                let choiceData = null;
                
                // 创建结果显示区域
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result-text';
                storyContent.appendChild(resultDiv);
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.type === 'start') {
                                    streamStatus.textContent = '正在生成结果描述...';
                                } else if (data.type === 'chunk') {
                                    resultText = data.fullText;
                                    resultDiv.innerHTML = `<strong>结果：</strong>${resultText}`;
                                    storyContent.scrollTop = storyContent.scrollHeight;
                                } else if (data.type === 'result_complete') {
                                    streamStatus.textContent = '正在生成后续叙事...';
                                } else if (data.type === 'complete') {
                                    choiceData = data.data;
                                    updateChoiceResultUI(choiceData);
                                } else if (data.type === 'error') {
                                    console.error('流式错误:', data.error);
                                    streamStatus.textContent = '生成失败: ' + data.error;
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }
                
                isProcessing = false;
                streamStatus.textContent = '';
                
            } catch (error) {
                isProcessing = false;
                streamStatus.textContent = '';
                selectedChoiceId = null;
                document.querySelectorAll('.choice-btn').forEach(btn => {
                    btn.disabled = false;
                    btn.classList.remove('selected');
                });
                console.error('提交选择失败:', error);
            }
        }
        
        function updateUI(data) {
            storyTitle.textContent = '第1回合 · 暗流涌动';
            storyMeta.textContent = '游戏开始';
            storyContent.innerHTML = `<div class="story-text">${data.opening}</div>`;
        }
        
        function updateTurnUI(data) {
            storyTitle.textContent = `第${data.turn}回合 · ${data.event ? '事件触发' : '暗流涌动'}`;
            storyMeta.textContent = `${data.scene.time} | 天气: ${data.scene.weather} | 压强: ${data.scene.pressure} | Ω: ${data.scene.omega}`;
            
            // 更新选择按钮
            currentChoices = data.choices;
            let choicesHtml = '<div class="choices-title">你的选择：</div>';
            data.choices.forEach((c, idx) => {
                choicesHtml += `<button class="choice-btn" data-choice-id="${c.id}" onclick="submitChoiceStream(${c.id})">${idx + 1}. ${c.text}</button>`;
            });
            choicesList.innerHTML = choicesHtml;
            
            // 更新状态
            if (data.player) {
                updatePlayerStatus(data.player);
            }
            
            // 更新回合指示器
            turnNumber.textContent = data.turn;
            turnLabel.textContent = `第 ${data.turn} / 72 回合`;
            document.getElementById('pressureValue').textContent = `${data.scene.pressure}/100`;
            document.getElementById('omegaValue').textContent = `Ω ${data.scene.omega}`;
        }
        
        function updateChoiceResultUI(data) {
            // 如果有后续叙事，追加显示
            if (data.followUpNarrative) {
                const followUpDiv = document.createElement('div');
                followUpDiv.className = 'story-text';
                followUpDiv.style.marginTop = '15px';
                followUpDiv.style.paddingTop = '15px';
                followUpDiv.style.borderTop = '1px solid #444';
                followUpDiv.textContent = data.followUpNarrative;
                storyContent.appendChild(followUpDiv);
            }
            
            // 更新玩家状态
            if (data.player) {
                updatePlayerStatus(data.player);
            }
            
            // 显示"下一回合"按钮
            choicesList.innerHTML = `
                <div class="choices-title">剧情推进完成</div>
                <button class="choice-btn" onclick="nextTurn()" style="background: #8b4513; border-color: #a0522d;">→ 进入下一回合</button>
            `;
        }
        
        async function nextTurn() {
            if (isProcessing) return;
            
            const nextBtn = document.querySelector('.choice-btn');
            if (nextBtn) {
                nextBtn.disabled = true;
                nextBtn.textContent = '加载中...';
            }
            
            selectedChoiceId = null;
            await executeTurnStream();
        }
        
        function updatePlayerStatus(player) {
            if (!player || !player.states) return;
            
            document.getElementById('fearValue').textContent = player.states.fear;
            document.querySelector('.fear-fill').style.width = `${player.states.fear}%`;
            
            document.getElementById('aggressionValue').textContent = player.states.aggression;
            document.querySelector('.aggression-fill').style.width = `${player.states.aggression}%`;
            
            document.getElementById('hungerValue').textContent = player.states.hunger;
            document.querySelector('.hunger-fill').style.width = `${player.states.hunger}%`;
        }
        
        async function init() {
            const success = await createGame('scholar');
            if (success) {
                await executeTurnStream();
            }
        }
        
        window.onload = init;
    </script>
</body>
</html>
