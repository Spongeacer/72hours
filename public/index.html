<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>72Hours - 叙事引擎</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'SimSun', serif;
            background: #1a1a1a;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
            padding: 10px;
            gap: 10px;
        }
        .left-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .character-status {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 8px 15px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
        }
        .status-item { display: flex; align-items: center; gap: 5px; }
        .status-label { color: #888; }
        .status-value { color: #fff; font-weight: bold; }
        .status-bar {
            width: 60px;
            height: 6px;
            background: #444;
            border-radius: 3px;
            overflow: hidden;
        }
        .status-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .fear-fill { background: #e74c3c; }
        .aggression-fill { background: #e67e22; }
        .hunger-fill { background: #f39c12; }
        .story-module {
            flex: 1;
            background: #252525;
            border: 1px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .story-header {
            background: #333;
            padding: 12px 15px;
            border-bottom: 1px solid #444;
        }
        .story-title { font-size: 16px; color: #fff; font-weight: bold; }
        .story-meta { font-size: 11px; color: #888; margin-top: 4px; }
        .story-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            line-height: 1.8;
        }
        .story-text { margin-bottom: 15px; }
        .choices-area {
            background: #2d2d2d;
            border-top: 1px solid #444;
            padding: 15px;
        }
        .choices-title {
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .choice-btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #3d3d3d;
            border: 1px solid #555;
            border-radius: 4px;
            color: #d4d4d4;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .choice-btn:hover:not(:disabled) {
            background: #4d4d4d;
            border-color: #777;
        }
        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .choice-btn.selected {
            background: #5d4a3d;
            border-color: #8b4513;
        }
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 250px;
        }
        .world-info {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 15px;
        }
        .world-title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .world-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .world-label { color: #888; }
        .world-value { color: #fff; font-weight: bold; }
        .model-select {
            width: 100%;
            padding: 8px;
            background: #3d3d3d;
            border: 1px solid #555;
            border-radius: 4px;
            color: #d4d4d4;
            margin-top: 10px;
            font-size: 13px;
        }
        .model-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 12px;
        }
        .model-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
            transition: background 0.3s;
        }
        .model-status-dot.connected {
            background: #27ae60;
            box-shadow: 0 0 4px #27ae60;
        }
        .model-status-dot.disconnected {
            background: #e74c3c;
            box-shadow: 0 0 4px #e74c3c;
        }
        .model-status-text {
            color: #888;
        }
        .turn-indicator {
            background: #8b4513;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            text-align: center;
            margin-top: 10px;
        }
        .turn-number { font-size: 24px; font-weight: bold; }
        .turn-label { font-size: 11px; opacity: 0.8; }
        .npc-relations {
            flex: 1;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .npc-header {
            background: #333;
            padding: 12px 15px;
            border-bottom: 1px solid #444;
        }
        .npc-title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .npc-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .npc-item {
            background: #3d3d3d;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .npc-item:hover { background: #4d4d4d; }
        .npc-item.active {
            background: #5d4a3d;
            border-color: #8b4513;
        }
        .npc-name { font-weight: bold; color: #fff; margin-bottom: 3px; }
        .npc-brief { font-size: 11px; color: #888; }
        .npc-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #555; }
        .npc-item.active .npc-detail { display: block; }
        .npc-stat { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        .npc-stat-label { color: #888; }
        .npc-stat-value { color: #d4d4d4; }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-overlay.active { display: flex; }
        .loading-text {
            color: #fff;
            font-size: 18px;
            padding: 20px 40px;
            background: #333;
            border-radius: 8px;
            border: 1px solid #555;
        }
        .result-text {
            border-left: 3px solid #8b4513;
            padding-left: 15px;
            margin-top: 15px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text">AI 正在生成叙事...</div>
    </div>
    
    <div class="container">
        <div class="left-panel">
            <div class="character-status">
                <div class="status-item">
                    <span class="status-label">恐惧:</span>
                    <div class="status-bar"><div class="status-fill fear-fill" style="width: 20%"></div></div>
                    <span class="status-value" id="fearValue">20</span>
                </div>
                <div class="status-item">
                    <span class="status-label">攻击性:</span>
                    <div class="status-bar"><div class="status-fill aggression-fill" style="width: 15%"></div></div>
                    <span class="status-value" id="aggressionValue">15</span>
                </div>
                <div class="status-item">
                    <span class="status-label">饥饿:</span>
                    <div class="status-bar"><div class="status-fill hunger-fill" style="width: 10%"></div></div>
                    <span class="status-value" id="hungerValue">10</span>
                </div>
            </div>
            
            <div class="story-module">
                <div class="story-header">
                    <div class="story-title" id="storyTitle">准备开始...</div>
                    <div class="story-meta" id="storyMeta">等待游戏初始化</div>
                </div>
                <div class="story-content" id="storyContent">
                    <div class="story-text">正在连接服务器...</div>
                </div>
                <div class="choices-area" id="choicesArea">
                    <div class="choices-title">你的选择：</div>
                    <div id="choicesList">请等待游戏加载...</div>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="world-info">
                <div class="world-title">世界剧本</div>
                <div class="world-content">
                    <div class="world-item">
                        <span class="world-label">剧本</span>
                        <span class="world-value">金田起义</span>
                    </div>
                    <div class="world-item">
                        <span class="world-label">时间跨度</span>
                        <span class="world-value">72小时</span>
                    </div>
                    <div class="world-item">
                        <span class="world-label">当前时间</span>
                        <span class="world-value" id="currentTime">1851.1.8 01:00</span>
                    </div>
                    <div class="world-item">
                        <span class="world-label">环境压强</span>
                        <span class="world-value" id="pressureValue">11/100</span>
                    </div>
                    <div class="world-item">
                        <span class="world-label">历史大势</span>
                        <span class="world-value" id="omegaValue">Ω 1.02</span>
                    </div>
                </div>
                <div class="model-status">
                    <span class="model-status-dot connected" id="modelStatusDot"></span>
                    <span class="model-status-text" id="modelStatusText">DeepSeek-V3.2</span>
                </div>
                <div class="turn-indicator">
                    <div class="turn-number" id="turnNumber">1</div>
                    <div class="turn-label" id="turnLabel">第 1 / 72 回合</div>
                </div>
            </div>
            
            <div class="npc-relations">
                <div class="npc-header">
                    <div class="npc-title">人物关系</div>
                </div>
                <div class="npc-list" id="npcList">
                    <div class="npc-item">
                        <div class="npc-name">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api/game'
            : `${window.location.origin}/api/game`;
        
        let sessionId = null;
        let currentChoices = [];
        let isProcessing = false;
        let selectedChoiceId = null;
        
        const loadingOverlay = document.getElementById('loadingOverlay');
        const storyContent = document.getElementById('storyContent');
        const choicesList = document.getElementById('choicesList');
        const storyTitle = document.getElementById('storyTitle');
        const storyMeta = document.getElementById('storyMeta');
        const turnNumber = document.getElementById('turnNumber');
        const turnLabel = document.getElementById('turnLabel');
        
        function showLoading() {
            loadingOverlay.classList.add('active');
        }
        
        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }
        
        async function createGame(identity = 'scholar') {
            try {
                showLoading();
                const response = await fetch(`${API_BASE}/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        identity
                    })
                });
                
                const data = await response.json();
                hideLoading();
                
                if (data.success) {
                    sessionId = data.sessionId;
                    updateUI(data.data);
                    return true;
                } else {
                    storyContent.innerHTML = `<div class="story-text">创建游戏失败: ${data.error}</div>`;
                    return false;
                }
            } catch (error) {
                hideLoading();
                storyContent.innerHTML = `<div class="story-text">连接服务器失败，请刷新重试</div>`;
                console.error('创建游戏失败:', error);
                return false;
            }
        }
        
        async function executeTurn() {
            if (!sessionId || isProcessing) return;
            
            try {
                showLoading();
                isProcessing = true;
                
                const response = await fetch(`${API_BASE}/turn`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });
                
                const data = await response.json();
                hideLoading();
                isProcessing = false;
                
                if (data.success) {
                    updateTurnUI(data.data);
                }
            } catch (error) {
                hideLoading();
                isProcessing = false;
                console.error('执行回合失败:', error);
            }
        }
        
        async function submitChoice(choiceId) {
            if (!sessionId || isProcessing || selectedChoiceId !== null) return;
            
            selectedChoiceId = choiceId;
            isProcessing = true;
            
            // 禁用所有按钮，只保留选中的高亮
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.disabled = true;
                if (parseInt(btn.dataset.choiceId) === choiceId) {
                    btn.classList.add('selected');
                }
            });
            
            try {
                showLoading();
                
                const response = await fetch(`${API_BASE}/choice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, choiceId })
                });
                
                const data = await response.json();
                hideLoading();
                
                if (data.success) {
                    // 确保 data.data 存在
                    if (data.data) {
                        updateChoiceResultUI(data.data);
                    } else {
                        throw new Error('返回数据格式错误');
                    }
                } else {
                    // 失败时恢复按钮状态
                    isProcessing = false;
                    selectedChoiceId = null;
                    document.querySelectorAll('.choice-btn').forEach(btn => {
                        btn.disabled = false;
                        btn.classList.remove('selected');
                    });
                    alert('提交失败: ' + data.error);
                }
            } catch (error) {
                hideLoading();
                isProcessing = false;
                selectedChoiceId = null;
                // 恢复按钮状态
                document.querySelectorAll('.choice-btn').forEach(btn => {
                    btn.disabled = false;
                    btn.classList.remove('selected');
                });
                console.error('提交选择失败:', error);
                alert('网络错误，请重试');
            }
        }
        
        function updateUI(data) {
            storyTitle.textContent = '第1回合 · 暗流涌动';
            storyMeta.textContent = '游戏开始';
            storyContent.innerHTML = `<div class="story-text">${data.opening}</div>`;
        }
        
        function updateTurnUI(data) {
            storyTitle.textContent = `第${data.turn}回合 · ${data.event ? '事件触发' : '暗流涌动'}`;
            storyMeta.textContent = `${data.scene.time} | 天气: ${data.scene.weather} | 压强: ${data.scene.pressure} | Ω: ${data.scene.omega}`;
            
            let html = `<div class="story-text">${data.narrative}</div>`;
            if (data.event) {
                html += `<div style="color: #e74c3c; margin-top: 10px;">⚠️ 事件: ${data.event.id}</div>`;
            }
            storyContent.innerHTML = html;
            
            // 更新选择按钮
            currentChoices = data.choices;
            let choicesHtml = '<div class="choices-title">你的选择：</div>';
            data.choices.forEach((c, idx) => {
                choicesHtml += `<button class="choice-btn" data-choice-id="${c.id}" onclick="submitChoice(${c.id})">${idx + 1}. ${c.text}</button>`;
            });
            choicesList.innerHTML = choicesHtml;
            
            // 更新状态
            if (data.player) {
                updatePlayerStatus(data.player);
            }
            
            // 更新回合指示器
            turnNumber.textContent = data.turn;
            turnLabel.textContent = `第 ${data.turn} / 72 回合`;
            document.getElementById('pressureValue').textContent = `${data.scene.pressure}/100`;
            document.getElementById('omegaValue').textContent = `Ω ${data.scene.omega}`;
        }
        
        function updateResultUI(data) {
            const resultHtml = `<div class="result-text"><strong>结果：</strong>${data.result.text}</div>`;
            storyContent.innerHTML += resultHtml;
            
            if (data.player) {
                updatePlayerStatus(data.player);
            }
        }
        
        // 显示选择结果和后续剧情，等待用户点击下一回合
        function updateChoiceResultUI(data) {
            // 添加结果叙事
            const resultHtml = `<div class="result-text"><strong>结果：</strong>${data.result.text}</div>`;
            storyContent.innerHTML += resultHtml;
            
            // 如果有后续剧情，追加到故事内容
            if (data.followUpNarrative) {
                const followUpHtml = `<div class="story-text" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #444;">${data.followUpNarrative}</div>`;
                storyContent.innerHTML += followUpHtml;
            }
            
            // 更新玩家状态
            if (data.player) {
                updatePlayerStatus(data.player);
            }
            
            // 显示"下一回合"按钮
            choicesList.innerHTML = `
                <div class="choices-title">剧情推进完成</div>
                <button class="choice-btn" onclick="nextTurn()" style="background: #8b4513; border-color: #a0522d;">→ 进入下一回合</button>
            `;
        }
        
        // 进入下一回合
        async function nextTurn() {
            if (isProcessing) return;
            
            // 禁用下一回合按钮防止重复点击
            const nextBtn = document.querySelector('.choice-btn');
            if (nextBtn) {
                nextBtn.disabled = true;
                nextBtn.textContent = '加载中...';
            }
            
            selectedChoiceId = null;
            await executeTurn();
        }
        
        function updatePlayerStatus(player) {
            if (!player || !player.states) return;
            
            document.getElementById('fearValue').textContent = player.states.fear;
            document.querySelector('.fear-fill').style.width = `${player.states.fear}%`;
            
            document.getElementById('aggressionValue').textContent = player.states.aggression;
            document.querySelector('.aggression-fill').style.width = `${player.states.aggression}%`;
            
            document.getElementById('hungerValue').textContent = player.states.hunger;
            document.querySelector('.hunger-fill').style.width = `${player.states.hunger}%`;
        }
        
        function updateNPCList(npcs) {
            const html = npcs.map(n => `
                <div class="npc-item" onclick="this.classList.toggle('active')">
                    <div class="npc-name">${n.name} ${n.isUnlocked ? '' : '(未解锁)'}</div>
                    <div class="npc-brief">${n.isUnlocked ? `关系: ${n.knot}/10` : '未解锁'}</div>
                    ${n.isUnlocked ? `
                    <div class="npc-detail">
                        <div class="npc-stat"><span class="npc-stat-label">关系羁绊</span><span class="npc-stat-value">${n.knot}/10</span></div>
                        <div class="npc-stat"><span class="npc-stat-label">恐惧值</span><span class="npc-stat-value">${n.states?.fear || 0}%</span></div>
                        <div class="npc-stat"><span class="npc-stat-label">执念</span><span class="npc-stat-value">${n.obsession || '未知'}</span></div>
                    </div>
                    ` : ''}
                </div>
            `).join('');
            document.getElementById('npcList').innerHTML = html;
        }
        
        async function init() {
            const success = await createGame('scholar');
            if (success) {
                await executeTurn();
            }
        }
        
        window.onload = init;
    </script>
</body>
</html>
