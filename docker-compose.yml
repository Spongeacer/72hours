version: '3.8'

services:
  game-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      game-server:
        condition: service_healthy
    environment:
      - GAME_SERVER_URL=http://game-server:3000
    volumes:
      - ./testlog.md:/app/testlog.md
    command: python3 test_docker_runner.py
